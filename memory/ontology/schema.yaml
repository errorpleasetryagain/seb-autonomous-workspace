# Ontology Schema
types:
  Person:
    required: [name]
    properties:
      name: string
      email: string?
      phone: string?
      notes: string?
  
  Project:
    required: [name, status]
    properties:
      name: string
      status: enum [planning, active, paused, completed, archived]
      goals: array
      owner: ref Person?
  
  Task:
    required: [title, status]
    properties:
      title: string
      status: enum [open, in_progress, blocked, done, cancelled]
      due: date?
      priority: enum [low, medium, high, critical]?
      assignee: ref Person?
      blockers: array ref Task
  
  Event:
    required: [title, start]
    properties:
      title: string
      start: datetime
      end: datetime?
      location: ref Location?
      attendees: array ref Person
      recurrence: string?
  
  Location:
    required: [name]
    properties:
      name: string
      address: string?
      coordinates: string?
  
  Document:
    required: [title]
    properties:
      title: string
      path: string?
      url: string?
      summary: string?
  
  Note:
    required: [content]
    properties:
      content: string
      tags: array
      refs: array

relations:
  has_owner:
    from_types: [Project, Task]
    to_types: [Person]
    cardinality: many_to_one
  
  has_task:
    from_types: [Project]
    to_types: [Task]
    cardinality: one_to_many
  
  blocks:
    from_types: [Task]
    to_types: [Task]
    cardinality: many_to_many
    acyclic: true
  
  for_project:
    from_types: [Task, Document]
    to_types: [Project]
    cardinality: many_to_one
  
  attended:
    from_types: [Person]
    to_types: [Event]
    cardinality: many_to_many
